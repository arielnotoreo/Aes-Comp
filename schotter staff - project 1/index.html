<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project 1 - Schotter's Staff</title>
</head>

<body>
    <svg xmlns="http://www.w3.org/2000/svg" width="800" height="800"></svg>

    <label for="noteSelect">Note Type</label>
    <select id="noteSelect">
        <option value="quarter">quarter note</option>
        <option value="half">half note</option>
        <option value="whole">whole note</option>
    </select>
</body>
<script>
    const width = 800;
    const height = 800;

    const tileSize = 40;
    const columns = Math.floor(width / tileSize);
    const rows = Math.floor(height / tileSize);

    const svg = document.querySelector("svg");

    let svgLink = "http://www.w3.org/2000/svg";

    const noteSelect = document.getElementById("noteSelect");
    let noteType = noteSelect.value;

    function musicNotes() {
        const group = document.createElementNS(svgLink, "g");

        // drawing the staff lines
        const line = document.createElementNS(svgLink, "line");
        line.setAttribute("x1", 0);
        line.setAttribute("y1", 8);
        line.setAttribute("x2", tileSize);
        line.setAttribute("y2", 8);
        line.setAttribute("stroke", "black");
        group.appendChild(line);

        // note head
        const note = document.createElementNS(svgLink, "circle");
        note.setAttribute("cx", tileSize / 2);
        note.setAttribute("cy", 8);
        note.setAttribute("r", 4);

        if (noteType == "quarter") {
            note.setAttribute("fill", "black");
        }
        else {
            note.setAttribute("stroke", "black");
            note.setAttribute("fill", "none");
        }

        group.appendChild(note);

        // stem
        if (noteType != "whole") {
            const stem = document.createElementNS(svgLink, "line");
            stem.setAttribute("x1", tileSize / 2 + 4);
            stem.setAttribute("y1", 8);
            stem.setAttribute("x2", tileSize / 2 + 4);
            stem.setAttribute("y2", -10);
            stem.setAttribute("stroke", "black");

            group.appendChild(stem);
        }

        return group;
    }

    function drawNotes() {
        svg.innerHTML = ""; // clear the svg panel

        for (let row = 0; row < rows; row++) {
            for (let col = 0; col < columns; col++) {
                const g = musicNotes();

                const baseX = col * tileSize;
                const baseY = row * tileSize;

                const random = row / rows;

                const offsetX = (Math.random() - 1) * 40 * random;
                const offsetY = (Math.random() - 1) * 80 * random;
                const rotation = (Math.random() - 1) * 120 * random;

                const transform = `
                translate(${baseX + offsetX}, ${baseY + offsetY})
                rotate(${rotation}, ${tileSize / 2}, ${tileSize / 2})
            `;

                g.setAttribute("transform", transform);

                svg.appendChild(g);
            }
        }
    }

    // update svg with drop down select
    noteSelect.addEventListener("change", (event) => {
        console.log("Selected value:", event.target.value);
        noteType = event.target.value;
        drawNotes();
    });

    window.onload = function () {
        noteType = noteSelect.value;
        drawNotes();
    };
</script>

</html>
